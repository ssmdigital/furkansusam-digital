<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>İletişim | Furkan Susam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="plugins/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="plugins/themefisher-fonts/css/themefisher-fonts.min.css">  
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/favicon.png" type="image/x-icon">
</head>

<body class="dark">

  <main class="site-wrapper">
    <div class="pt-table">
      <div class="pt-tablecell page-contact relative">
        <a href="./" class="page-close"><i class="tf-ion-close"></i></a>

        <div class="container">
          <div class="row">
            <div class="col-xs-12 col-md-offset-1 col-md-10 col-lg-offset-2 col-lg-8">
              <div class="page-title text-center">
                <h2>BİR MESAJ <span class="primary">UZAKTAYIM</span> <span class="title-bg">İLETİŞİM</span></h2>
                <p>İmkanların bittiği yerde bizim çözümlerimiz başlar. Projeniz veya sorununuz için direkt iletişime geçin.</p>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-xs-12 col-sm-5 col-md-4 col-lg-3">
              <div class="contact-block">
                <div class="media">
                  <div class="media-left"><i class="tf-envelope2"></i></div>
                  <div class="media-body">
                    <h4>E-Mail</h4>
                    <p><a href="mailto:hi@furkansusam.digital">hi@furkansusam.digital</a></p>
                  </div>
                </div>
              </div>
              
              <div class="contact-block">
                <div class="media">
                  <div class="media-left"><i class="tf-phone2"></i></div>
                  <div class="media-body">
                    <h4>WhatsApp</h4>
                    <p><a href="https://wa.me/905376387310">+90 537 638 73 10</a></p>
                  </div>
                </div>
              </div>

              <div class="contact-block">
                <div class="media">
                  <div class="media-left"><i class="tf-ion-social-instagram"></i></div>
                  <div class="media-body">
                    <h4>Instagram</h4>
                    <p><a href="https://instagram.com/fuvkanbey">@fuvkanbey</a></p>
                  </div>
                </div>
              </div>

              <ul class="contact-social">
                <li><span class="contact-social-hex"></span><a href="https://instagram.com/fuvkanbey"><i class="tf-ion-social-instagram"></i></a></li>
                <li><span class="contact-social-hex"></span><a href="https://wa.me/905376387310"><i class="tf-chat"></i></a></li>
              </ul>
            </div>

            <div class="col-xs-12 col-sm-7 col-md-7 col-md-offset-1 col-lg-offset-2">
              <div class="section-title clear">
                <h3>Detaylı Bilgi Alın</h3>
                <span class="bar-dark"></span>
                <span class="bar-primary"></span>
              </div>

              <form id="contact-form" class="row contact-form no-gutter" action="#" method="post">
                <div class="col-xs-12 col-sm-6">
                  <div class="input-field name">
                    <span class="input-icon"><i class="tf-profile-male"></i></span>
                    <input type="text" class="form-control" placeholder="Adınız Soyadınız" required>
                  </div>
                </div>
                <div class="col-xs-12 col-sm-6">
                  <div class="input-field email">
                    <span class="input-icon"><i class="tf-envelope2"></i></span>
                    <input type="email" class="form-control" name="email" placeholder="E-Posta Adresiniz" required>
                  </div>
                </div>
                <div class="col-xs-12 col-sm-12">
                  <div class="input-field">
                    <span class="input-icon"><i class="tf-pricetags"></i></span>
                    <input type="text" class="form-control" name="subject" placeholder="Konu (Hesap Açma, Mavi Tik vb.)" required>
                  </div>
                </div>
                <div class="col-xs-12 col-sm-12">
                  <div class="input-field message">
                    <span class="input-icon"><i class="tf-pencil2"></i></span>
                    <textarea name="message" id="message" class="form-control" placeholder="Mesajınızın detaylarını buraya yazın..." required></textarea>
                  </div>
                </div>
                <div class="col-xs-12 col-sm-12">
                  <div class="input-field">
                    <span class="btn-border">
                      <button type="submit" class="btn btn-primary btn-custom-border text-uppercase">HEMEN GÖNDER</button>
                    </span>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>

        <nav class="page-nav clear">
          <div class="container">
            <div class="flex flex-middle space-between">
              <span class="prev-page"><a href="testimonials.html" class="link">&larr; REFERANSLAR</a></span>
              <span class="copyright">FURKAN SUSAM © 2026</span>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </main>

<script src="plugins/jquery-2.2.4.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
